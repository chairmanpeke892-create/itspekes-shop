    }

      background:#fff;

    }

    nav a{
      text-decoration:none;
      margin-left:20px;
      color:#111;
      font-weight:bold;
    }

    .hero{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:40px;
      padding:80px 10%;
      align-items:center;
      background:#fff;
    }

    .hero img{
      width:100%;
      border-radius:20px;
    }

    .hero h2{

    .hero p{

      margin-bottom:30px;

    }

      background:#111;
      color:#fff;
      padding:15px 30px;
      border-radius:12px;
      text-decoration:none;
      margin-right:15px;
    }

    .collections{
      padding:80px 10%;
      text-align:center;
    }

    .collections h3{
      font-size:40px;
      margin-bottom:20px;
    }

    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:30px;
      margin-top:50px;
    }

    .card{
      background:#fff;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 5px 20px rgba(0,0,0,0.05);
    }

    .card img{
      width:100%;
      height:300px;
      object-fit:cover;
    }

    .card-content{
      padding:25px;
    }

    .card-content h4{
      font-size:24px;
      margin-bottom:10px;
    }

    .card-content p{
      color:#666;
      margin-bottom:20px;
    }

    .features{
      padding:80px 10%;
      background:#fff;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:30px;
      text-align:center;
    }

    .feature{
      background:#f9f9f9;
      padding:40px;
      border-radius:20px;
    }

    .newsletter{
      background:#111;
      color:#fff;
      text-align:center;
      padding:80px 10%;
    }

      margin-top:30px;
    }

    .newsletter input{

      width:300px;
      max-width:90%;
      border:none;
      border-radius:10px;
      margin-right:10px;
    }

    .newsletter button{
      padding:15px 25px;
      border:none;
      border-radius:10px;
      background:#fff;
      font-weight:bold;
      cursor:pointer;
    }

    .contact{
      text-align:center;
      padding:80px 10%;
    }

    footer{

      color:#fff;
      text-align:center;
      padding:30px;
    }

        grid-template-columns:1fr;
      }

      .hero h2{
        font-size:42px;
      }

      header{
        flex-direction:column;
        gap:15px;
      }
    }
  </style>
